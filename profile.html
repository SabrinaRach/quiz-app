<!doctype html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="./styles.css" />
  <title>Car Quiz App</title>
</head>
<header>
  <p>Car Quiz</p>
</header>
<main id="main-content">
  <section>
    <h1>Your personal profile</h1>
  </section>

  <section>
     <div class="question-card-profile">
      <div class="profile-header">
    <img
      src="assets/profile_picture.png"
      alt="young woman with brown hair smiling"
      width="100"
      height="100"
    />
    <h3>About me</h3>
    </div>
    <p>Car enthusiast who likes riddles and quizzes.</p>
 </div>
    <div>
      <button class="created-questions">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          class="lucide lucide-circle-question-mark-icon lucide-circle-question-mark"
        >
          <circle cx="12" cy="12" r="10" />
          <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3" />
          <path d="M12 17h.01" />
        </svg>
        <span>12</span> <!--- Hier wird die Anzahl der created questions angegeben -->
      </button>
      <button class="bookmarks-profile">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          class="lucide lucide-bookmark-icon lucide-bookmark"
        >
          <path
            d="M17 3a2 2 0 0 1 2 2v15a1 1 0 0 1-1.496.868l-4.512-2.578a2 2 0 0 0-1.984 0l-4.512 2.578A1 1 0 0 1 5 20V5a2 2 0 0 1 2-2z"
          />
        </svg>
        <span>3</span> <!-- hier wird die Anzahl der bookmarks angegeben -->
      </button>
    </div>
    </div>
  </section>
  <section>
    <div>
      <h3>Settings</h3>
      <button class="darkmode">darkmode</button>
    </div>
  </section>

  <footer>
    <nav aria-label="Main Navigation">

        <svg

          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          class="lucide lucide-house-icon lucide-house"

          <path d="M15 21v-8a1 1 0 0 0-1-1h-4a1 1 0 0 0-1 1v8" />
          <path
            d="M3 10a2 2 0 0 1 .709-1.528l7-6a2 2 0 0 1 2.582 0l7 6A2 2 0 0 1 21 10v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"
